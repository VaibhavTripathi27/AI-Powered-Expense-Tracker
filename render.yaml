# Render Blueprint for the AI Expense Tracker backend.
# Database is hosted on Neon (set DATABASE_URL in the dashboard).
services:
  - type: web
    name: ai-expense-tracker-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Neon connection string (sslmode=require)
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: '1440'
      - key: BACKEND_CORS_ORIGINS
        sync: false # e.g. https://your-app.vercel.app
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
      - key: ENVIRONMENT
        value: production
